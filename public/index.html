<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>buildtutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
  </head>
  <body>
    <header id="topbar">
      <div class="brand">
        <div class="brand-logo" id="brandLogo">B</div>
        <div class="brand-copy">
          <div class="brand-name" id="brandName">buildtutor</div>
          <div class="brand-sub" id="brandSub">watching your codebase</div>
        </div>
      </div>
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span class="conn-label" id="connLabel">connecting</span>
      </div>
    </header>

    <!-- ── Main area ── -->
    <div id="canvasArea">
      <!-- hint shown when no updates yet -->
      <div class="hint-toast" id="hintToast">
        Waiting for your first code change &mdash; call
        <span class="mono">report_project_update</span> from your agent.
      </div>

      <!-- architecture diagram canvas (shown when update has diagram data) -->
      <div id="canvas">
        <div id="canvasWrap">
          <svg
            id="edgeSvg"
            viewBox="0 0 1200 680"
            width="1200"
            height="680"
            style="
              position: absolute;
              left: 0;
              top: 0;
              overflow: visible;
              pointer-events: none;
            "
          ></svg>
          <div
            id="packetLayer"
            style="
              position: absolute;
              left: 0;
              top: 0;
              width: 1200px;
              height: 680px;
              pointer-events: none;
            "
          ></div>
          <div
            id="nodesLayer"
            style="
              position: absolute;
              left: 0;
              top: 0;
              width: 1200px;
              height: 680px;
            "
          ></div>
        </div>
      </div>

      <!-- text fallback (shown when update has no diagram) -->
      <div id="textView">
        <div id="mainContent"></div>
      </div>

      <!-- node detail panel (slides in from right on node click) -->
      <aside id="nodePanel" class="atlas-scroll">
        <button id="nodePanelClose" class="close-btn" aria-label="Close">
          &#x2715;
        </button>
        <div id="nodePanelBody"></div>
      </aside>
    </div>

    <div id="timelineBar">
      <div id="timelineMeta"></div>
      <div id="timelineTrack">
        <div id="timelineDots"></div>
        <div class="tl-arrows">
          <button class="tl-arrow" id="tlPrev" title="Previous update">
            &#9664;
          </button>
          <button class="tl-arrow" id="tlNext" title="Next update">
            &#9654;
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
